<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hajicli 可观测性轨迹控制台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0B0F17;
      --bg-sidebar: #111827;
      --bg-card: #1F2937;
      --bg-card-hover: #374151;
      --border-color: #374151;
      --text-main: #F3F4F6;
      --text-muted: #9CA3AF;
      --primary: #3B82F6;
      --primary-glow: rgba(59, 130, 246, 0.15);
      --success: #10B981;
      --success-glow: rgba(16, 185, 129, 0.1);
      --warning: #F59E0B;
      --warning-glow: rgba(245, 158, 11, 0.1);
      --danger: #EF4444;
      --danger-glow: rgba(239, 68, 68, 0.1);
      --brain-purple: #8B5CF6;
      --brain-purple-glow: rgba(139, 92, 246, 0.1);
      --timeline-line: #374151;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 侧边栏 */
    .sidebar {
      width: 320px;
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-badge {
      background: linear-gradient(135deg, var(--primary), var(--brain-purple));
      color: white;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 14px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .sidebar-title {
      font-size: 16px;
      font-weight: 600;
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .session-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .session-card:hover {
      background-color: var(--bg-card-hover);
      transform: translateY(-2px);
    }

    .session-card.active {
      border-color: var(--primary);
      box-shadow: 0 0 12px var(--primary-glow);
      background-color: var(--bg-card-hover);
    }

    .session-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .session-id-badge {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      color: var(--text-muted);
      background-color: rgba(255, 255, 255, 0.05);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .session-model {
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
    }

    .session-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .session-card-stats {
      display: flex;
      gap: 10px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .session-card-stats span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 主内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.03), transparent 40%);
    }

    .main-header {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(17, 24, 39, 0.3);
      backdrop-filter: blur(10px);
    }

    .main-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .metrics-dashboard {
      display: flex;
      gap: 20px;
    }

    .metric-pill {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 90px;
      text-align: center;
    }

    .metric-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 500;
    }

    .metric-value {
      font-size: 15px;
      font-weight: 600;
      font-family: 'Fira Code', monospace;
    }

    /* 时间轴事件流 */
    .timeline-container {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      position: relative;
    }

    .timeline-container::before {
      content: '';
      position: absolute;
      left: 60px;
      top: 40px;
      bottom: 40px;
      width: 2px;
      background-color: var(--timeline-line);
      z-index: 0;
    }

    .timeline-event {
      display: flex;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    .event-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background-color: var(--bg-card);
      border: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 20px;
      margin-right: 25px;
      font-size: 18px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
      flex-shrink: 0;
    }

    .event-content-wrapper {
      flex: 1;
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      max-width: 85%;
    }

    .event-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 8px;
    }

    .event-type {
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .event-time {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'Fira Code', monospace;
    }

    .event-body {
      font-size: 14px;
      line-height: 1.6;
      word-break: break-all;
    }

    /* 样式变体 */
    .event-user_input .event-icon {
      border-color: var(--primary);
      color: var(--primary);
      background-color: var(--primary-glow);
    }

    .event-llm_call .event-icon {
      border-color: var(--brain-purple);
      color: var(--brain-purple);
      background-color: var(--brain-purple-glow);
    }

    .event-tool_execution .event-icon {
      border-color: var(--warning);
      color: var(--warning);
      background-color: var(--warning-glow);
    }

    /* 指标卡片 */
    .llm-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 15px;
    }

    .llm-metric-tag {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 4px 8px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .llm-metric-tag.green {
      color: var(--success);
      background-color: var(--success-glow);
      border-color: rgba(16, 185, 129, 0.2);
    }

    .llm-metric-tag.purple {
      color: var(--brain-purple);
      background-color: var(--brain-purple-glow);
      border-color: rgba(139, 92, 246, 0.2);
    }

    /* 思考卡片 */
    .reasoning-box {
      background-color: rgba(139, 92, 246, 0.04);
      border-left: 3px solid var(--brain-purple);
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 15px;
      font-style: italic;
      color: var(--text-muted);
      font-size: 13px;
      white-space: pre-wrap;
    }

    .reasoning-box-title {
      font-style: normal;
      font-weight: 600;
      font-size: 12px;
      color: var(--brain-purple);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 可折叠组件 */
    .collapsible {
      margin-top: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      overflow: hidden;
    }

    .collapsible-header {
      background-color: rgba(255, 255, 255, 0.02);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      transition: background-color 0.2s;
    }

    .collapsible-header:hover {
      background-color: rgba(255, 255, 255, 0.05);
    }

    .collapsible-content {
      display: none;
      padding: 12px;
      background-color: rgba(0, 0, 0, 0.2);
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* 工具卡片详情 */
    .tool-info {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tool-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .tool-badge {
      background-color: var(--warning-glow);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.2);
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-family: 'Fira Code', monospace;
      font-size: 12px;
    }

    .tool-status-badge {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
    }

    .status-approved {
      background-color: var(--success-glow);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-rejected {
      background-color: var(--danger-glow);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .code-view {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      padding: 12px;
      background-color: #0d1117;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      overflow-x: auto;
      color: #e6edf3;
      white-space: pre-wrap;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      gap: 15px;
    }

    .empty-icon {
      font-size: 48px;
      opacity: 0.5;
    }

    /* 自定义滚动条 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo-badge">haji</div>
      <div class="sidebar-title">观测轨迹中心</div>
    </div>
    <div class="session-list" id="sessionList">
      <!-- 动态注入会话 -->
    </div>
  </div>

  <!-- 主视图 -->
  <div class="main-content">
    <!-- 顶部状态栏 -->
    <div class="main-header" style="display: none;" id="mainHeader">
      <div class="main-title">会话事件流详情</div>
      <div class="metrics-dashboard">
        <div class="metric-pill">
          <span class="metric-label">平均 TTFT</span>
          <span class="metric-value" id="metricTtft">-</span>
        </div>
        <div class="metric-pill">
          <span class="metric-label">交互轮数</span>
          <span class="metric-value" id="metricRounds">-</span>
        </div>
        <div class="metric-pill">
          <span class="metric-label">工具调用</span>
          <span class="metric-value" id="metricTools">-</span>
        </div>
      </div>
    </div>

    <!-- 事件流区域 -->
    <div class="timeline-container" id="timelineContainer">
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <p>请在左侧选择一个观测会话查看完整轨迹时间轴</p>
      </div>
    </div>
  </div>

  <script>
    const serverUrl = window.location.origin;
    let activeSessionId = null;
    let pollTimer = null;
    let lastEventCount = 0;

    // 初始化加载会话列表
    async function loadSessions() {
      try {
        const response = await fetch(`${serverUrl}/api/sessions`);
        const sessions = await response.json();
        renderSessionList(sessions);
      } catch (err) {
        console.error('无法获取会话列表:', err);
      }
    }

    // 渲染左侧会话卡片列表
    function renderSessionList(sessions) {
      const listContainer = document.getElementById('sessionList');
      if (sessions.length === 0) {
        listContainer.innerHTML = '<div class="empty-state" style="font-size: 12px;">无可用 Trace 数据</div>';
        return;
      }

      listContainer.innerHTML = sessions.map(session => {
        const shortId = session.id.slice(0, 8);
        const isActive = session.id === activeSessionId ? 'active' : '';
        const startTime = new Date(session.startTime).toLocaleString('zh-CN', {
          month: 'numeric',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });
        
        return `
          <div class="session-card ${isActive}" id="card-${session.id}" onclick="selectSession('${session.id}')">
            <div class="session-card-header">
              <span class="session-id-badge">ID: ${shortId}</span>
              <span class="session-model">${session.modelUsed}</span>
            </div>
            <div class="session-time">${startTime}</div>
            <div class="session-card-stats">
              <span>🔄 ${session.eventCount} 事件</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // 选中并加载某个具体会话，支持定时自轮询
    async function selectSession(sessionId, isAutoPoll = false) {
      if (pollTimer) {
        clearTimeout(pollTimer);
        pollTimer = null;
      }
      activeSessionId = sessionId;

      // 手动切换会话时重置事件计数
      if (!isAutoPoll) {
        lastEventCount = 0;
        document.querySelectorAll('.session-card').forEach(card => card.classList.remove('active'));
        const activeCard = document.getElementById(`card-${sessionId}`);
        if (activeCard) activeCard.classList.add('active');
      }

      try {
        const response = await fetch(`${serverUrl}/api/session/${sessionId}`);
        const sessionData = await response.json();
        
        renderSessionDetails(sessionData, isAutoPoll);

        // 如果是活跃会话（没有结束时间），则开启 1.5 秒定时刷新
        if (!sessionData.endTime) {
          pollTimer = setTimeout(() => selectSession(sessionId, true), 1500);
        }
      } catch (err) {
        console.error('获取会话详情失败:', err);
      }
    }

    // 渲染右侧详情与时间轴
    function renderSessionDetails(session, isAutoPoll = false) {
      // 如果是自动轮询且事件总数没有增加，跳过重绘以保证浏览流畅
      if (isAutoPoll && session.events.length === lastEventCount) {
        return;
      }
      lastEventCount = session.events.length;

      document.getElementById('mainHeader').style.display = 'flex';
      const container = document.getElementById('timelineContainer');
      
      // 判断当前滚动位置，是否在最底部附近
      const wasAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 60;
      const oldScrollTop = container.scrollTop;

      container.innerHTML = '';

      // 提取核心指标
      let totalLlmCalls = 0;
      let totalTtft = 0;
      let totalTools = 0;

      session.events.forEach(ev => {
        if (ev.type === 'llm_call') {
          totalLlmCalls++;
          totalTtft += ev.data.ttft || 0;
        } else if (ev.type === 'tool_execution') {
          totalTools++;
        }
      });

      const avgTtft = totalLlmCalls > 0 ? Math.round(totalTtft / totalLlmCalls) : 0;
      document.getElementById('metricTtft').innerText = `${avgTtft}ms`;
      document.getElementById('metricRounds').innerText = totalLlmCalls;
      document.getElementById('metricTools').innerText = totalTools;

      // 渲染时间线事件
      session.events.forEach(event => {
        const eventEl = document.createElement('div');
        eventEl.className = `timeline-event event-${event.type}`;
        
        const timestamp = new Date(event.timestamp).toLocaleTimeString('zh-CN');
        let icon = '💬';
        let typeLabel = '';
        let bodyHtml = '';

        if (event.type === 'user_input') {
          icon = '👤';
          typeLabel = '用户输入';
          bodyHtml = `<div class="event-body" style="font-weight: 500;">${event.content}</div>`;
        } 
        else if (event.type === 'llm_call') {
          icon = '🤖';
          typeLabel = `大模型调用`;
          const data = event.data;

          const speedLabel = data.speed > 0 ? `${data.speed.toFixed(1)} /s` : '-';
          
          // 寻找 messages 列表中的 System Prompt 消息
          const sysMsg = data.messages.find(m => m.role === 'system');
          const sysPromptContent = sysMsg ? sysMsg.content : '无 System Prompt';

          let reasoningHtml = '';
          if (data.reasoningContent) {
            reasoningHtml = `
              <div class="reasoning-box">
                <div class="reasoning-box-title">🧠 推理思考过程</div>
                <div>${data.reasoningContent}</div>
              </div>
            `;
          }

          bodyHtml = `
            <div class="llm-metrics">
              <div class="llm-metric-tag purple">⚙️ 模型: ${data.model}</div>
              <div class="llm-metric-tag green">⏱️ TTFT: ${data.ttft}ms</div>
              <div class="llm-metric-tag">⏳ 耗时: ${data.duration}ms</div>
              <div class="llm-metric-tag">🚀 速度: ${speedLabel}</div>
            </div>
            
            ${reasoningHtml}

            <div class="event-body code-view" style="background-color: transparent; border: none; padding: 0; color: var(--text-main); font-family: inherit; font-size: inherit;">
              ${data.content.replace(/\n/g, '<br>')}
            </div>

            <div class="collapsible">
              <div class="collapsible-header" onclick="toggleCollapsible(this)">
                <span>📄 生效的动态系统提示词 (System Prompt)</span>
                <span>展开 ▾</span>
              </div>
              <div class="collapsible-content">${escapeHtml(sysPromptContent)}</div>
            </div>

            <div class="collapsible">
              <div class="collapsible-header" onclick="toggleCollapsible(this)">
                <span>📥 完整的输入上下文消息快照 (Messages Context)</span>
                <span>展开 ▾</span>
              </div>
              <div class="collapsible-content">${escapeHtml(JSON.stringify(data.messages, null, 2))}</div>
            </div>
          `;
        } 
        else if (event.type === 'tool_execution') {
          icon = '🛠️';
          typeLabel = '外部工具执行';
          const data = event.data;
          const statusClass = data.approved ? 'status-approved' : 'status-rejected';
          const statusText = data.approved ? '用户授权已执行' : '用户拒绝执行';
          const durationText = data.duration ? `⏳ 耗时 ${data.duration}ms` : '';

          bodyHtml = `
            <div class="tool-info">
              <div class="tool-header-row">
                <div>
                  <span class="tool-badge">${data.name}</span>
                  <span style="font-size: 12px; margin-left: 10px; color: var(--text-muted);">${durationText}</span>
                </div>
                <span class="tool-status-badge ${statusClass}">${statusText}</span>
              </div>
              <div style="font-size: 12px; color: var(--text-muted); font-weight: 500;">执行入参:</div>
              <pre class="code-view">${escapeHtml(JSON.stringify(data.arguments, null, 2))}</pre>
              ${data.approved ? `
                <div style="font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top: 5px;">工具运行输出:</div>
                <pre class="code-view" style="border-color: rgba(16, 185, 129, 0.15);">${escapeHtml(data.output || '')}</pre>
              ` : ''}
            </div>
          `;
        }

        eventEl.innerHTML = `
          <div class="event-icon">${icon}</div>
          <div class="event-content-wrapper">
            <div class="event-header">
              <span class="event-type">${typeLabel}</span>
              <span class="event-time">${timestamp}</span>
            </div>
            ${bodyHtml}
          </div>
        `;
        
        container.appendChild(eventEl);
      });

      // 滚动还原或置底逻辑优化
      if (isAutoPoll) {
        if (wasAtBottom) {
          container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        } else {
          container.scrollTop = oldScrollTop;
        }
      } else {
        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
      }
    }

    // 切换折叠逻辑
    function toggleCollapsible(header) {
      const content = header.nextElementSibling;
      const arrow = header.querySelector('span:last-child');
      if (content.style.display === 'block') {
        content.style.display = 'none';
        arrow.innerText = '展开 ▾';
      } else {
        content.style.display = 'block';
        arrow.innerText = '收起 ▴';
      }
    }

    // HTML 转义
    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // 页面初次加载与每 3 秒刷新会话列表
    window.addEventListener('load', () => {
      loadSessions();
      setInterval(loadSessions, 3000);
    });
  </script>
</body>
</html>
